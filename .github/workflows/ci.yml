name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: go (lint, test, cover, vuln)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16@sha256:081f1bc7bd5e143dbb6e487b710bbc27712cdcfaced4c071b8e47349aa1b4171
        env:
          POSTGRES_PASSWORD: secret
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    env:
      PGPEEK_TEST_DATABASE_URL: postgres://postgres:secret@localhost:5432/testdb?sslmode=disable
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.12.2

      - name: go vet
        run: go vet ./...

      - name: test (race + integration + coverage)
        run: |
          go test -race -tags=integration \
            -coverpkg=./... -coverprofile=cover.out ./...

      - name: enforce 100% coverage on internal/...
        run: ./scripts/check-coverage.sh cover.out

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  web:
    name: web (vitest 100%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx vitest run --coverage # thresholds enforce 100%
      - name: verify vendored CodeMirror bundle is up to date
        run: |
          npm run vendor
          git diff --exit-code web/vendor/codemirror6.js \
            || { echo "::error::Vendored CodeMirror bundle is stale. Run 'make web-vendor' and commit web/vendor/codemirror6.js."; exit 1; }

  # Full release packaging in snapshot mode (build everything, publish
  # nothing) on every PR, via the SAME reusable workflow the real release
  # uses. This exercises archives, checksums, SBOM/syft cataloging and the ko
  # image build, so release breakage is caught here instead of after a tag.
  goreleaser-snapshot:
    name: image build (snapshot)
    permissions:
      contents: read
    uses: ./.github/workflows/goreleaser.yml
    with:
      snapshot: true
