name: goreleaser

# Reusable workflow. Builds the binaries, archives, checksums and SBOMs, and
# (via ko) the multi-arch distroless images. Called in three modes:
#
#   snapshot:true  publish:false  -> PR build. Runs the FULL ko build+push path
#                  so we actually SEE the image build, but pushes to a throwaway
#                  local registry on the runner (localhost:5000) instead of GHCR.
#                  No external creds, nothing lands in GHCR.
#   snapshot:true  publish:true   -> push-to-main smoke publish. Same build, but
#                  ko pushes to GHCR under non-clobbering tags (main/edge/short-
#                  sha) so the publish path is continuously verified. No GitHub
#                  Release is touched (.goreleaser.main.yaml disables release).
#   snapshot:false publish:true   -> real release. Pushes images to GHCR and
#                  attaches archives/checksums to the App-created GitHub Release.
#                  Needs client-id + private-key so goreleaser gets an App token
#                  that can see the App-created Release.
#
# NOTE: ko's `--snapshot` mode publishes to `ko.local` (the local Docker daemon),
# which hangs on the runner. So the snapshot builds here run a REAL ko build
# (`--skip=validate` bypasses the new-tag/dirty-state checks) and push to a
# registry — GHCR for main, a local registry for PRs.
#
# Permissions are inherited from the calling job, so callers must grant
# contents:write + packages:write + id-token:write whenever publish:true.

on:
  workflow_call:
    inputs:
      snapshot:
        description: "Build without a tag / GitHub Release (PR + main smoke builds)."
        type: boolean
        default: false
      publish:
        description: "Push images to GHCR. false = push to a throwaway local registry (PRs)."
        type: boolean
        default: true
    secrets:
      client-id:
        description: "GitHub App Client ID (e.g. MEGA_APP_ID). Required for a real release so goreleaser gets an App token that can see the App-created Release. Omit for snapshot/main publishes."
        required: false
      private-key:
        description: "GitHub App private key (PEM), paired with client-id. Required for a real release; omit otherwise."
        required: false

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    # PR builds push to this throwaway registry so the full ko build+push path is
    # exercised without touching GHCR or needing creds. Ignored when publish:true.
    services:
      registry:
        image: registry:2@sha256:1fc7de654f2ac1247f0b67e8a459e273b0993be7d2beda1f3f56fbf1001ed3e7
        ports:
          - 5000:5000
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          check-latest: true

      # goreleaser's `sboms:` block and ko's `sbom: spdx` shell out to syft,
      # which is NOT bundled with goreleaser-action. Install it explicitly or
      # the SBOM step fails with: exec: "syft": executable file not found.
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      # App token only for the real release: it lets goreleaser see/append to the
      # Release that release-please created under the App identity. Snapshot/main
      # publishes don't touch a Release, so they fall back to GITHUB_TOKEN.
      - name: Mint GitHub App token
        if: ${{ !inputs.snapshot && inputs.publish }}
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.client-id }}
          private-key: ${{ secrets.private-key }}

      - name: Log in to GHCR
        if: ${{ inputs.publish }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: goreleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          version: "~> v2"
          # Snapshot builds (PR + main) use .goreleaser.main.yaml: a real ko
          # build that PUSHES (ko's --snapshot would publish to ko.local and
          # hang). --skip=validate bypasses the new-tag/dirty-state checks since
          # there's no fresh tag on these builds. The real release uses the full
          # default config + flow.
          args: >-
            ${{ inputs.snapshot
              && 'release --clean --skip=validate --config .goreleaser.main.yaml'
              || 'release --clean' }}
        env:
          # App token for the real release so goreleaser can append to the
          # App-created Release; GITHUB_TOKEN otherwise (snapshot/main don't
          # touch a Release).
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          # publish:true -> push to GHCR; publish:false (PRs) -> push to the
          # throwaway local registry service so nothing lands in GHCR.
          KO_DOCKER_REPO: ${{ inputs.publish && 'ghcr.io/descope/pgpeek' || 'localhost:5000/pgpeek' }}
