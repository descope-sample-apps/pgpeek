name: release-please

# Maintains a release PR from Conventional Commits on main. Merging it tags a
# version and publishes a GitHub Release, which triggers release.yml (goreleaser
# + ko) via the new tag.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
