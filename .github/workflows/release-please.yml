name: release-please

# Maintains a release PR from Conventional Commits on main. Merging it tags a
# version and publishes a GitHub Release, which triggers release.yml (goreleaser
# + ko) via the new tag.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          app-id: ${{ secrets.MEGA_APP_ID }}
          private-key: ${{ secrets.MEGA_APP_PEM }}

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5
        with:
          # App token (not the default GITHUB_TOKEN) so the pushed tag/release
          # triggers downstream workflows like release.yml.
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
