name: release

# Triggered when release-please pushes a vX.Y.Z tag. Builds binaries and
# publishes multi-arch distroless images to GHCR via goreleaser + ko.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # attach archives/checksums to the release
  packages: write # push images to ghcr.io
  id-token: write # keyless signing / SBOM attestation

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: goreleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ko reads the docker login above for GHCR auth.
          KO_DOCKER_REPO: ghcr.io/descope/pgpeek
