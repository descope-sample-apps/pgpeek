# goreleaser config for non-release ko publishes (PR builds + push-to-main smoke
# publishes). A REAL ko build that PUSHES — ko's --snapshot mode publishes to
# ko.local (the local Docker daemon) which hangs on the runner, so the calling
# workflow runs this WITHOUT --snapshot and with --skip=validate instead.
#
# The target registry comes from KO_DOCKER_REPO (set by the workflow): GHCR for
# main, a throwaway local registry for PRs. Tags are deliberately distinct from
# the real release config: only `main`, `edge`, and the short commit SHA — it
# NEVER writes `latest` / `{{.Major}}.{{.Minor}}` / `{{.Version}}`, so it can
# never clobber a real released image.
version: 2

project_name: pgpeek

before:
  hooks:
    - go mod tidy

builds:
  - id: pgpeek
    main: .
    binary: pgpeek
    env:
      - CGO_ENABLED=0
      - GOFIPS140=v1.0.0
      - GODEBUG=fips140=on
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}

kos:
  - id: pgpeek
    build: pgpeek
    main: .
    base_image: gcr.io/distroless/static-debian12:nonroot
    # KO_DOCKER_REPO (set by the workflow) overrides this at runtime: GHCR for
    # main, a throwaway local registry for PRs. The entry below only satisfies
    # `goreleaser check`, which runs without the env var set.
    repositories:
      - ghcr.io/descope-sample-apps/pgpeek
    platforms:
      - linux/amd64
      - linux/arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{ .Version }}
    tags:
      - main
      - edge
      - "{{ .ShortCommit }}"
    bare: true
    preserve_import_paths: false
    sbom: spdx

# No archives / checksums / GitHub Release: this is an image-only smoke publish.
archives:
  - id: pgpeek
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

release:
  disable: true
