# Docker Compose stack for pgpeek — Postgres with seeded demo data + the app.
#
# Usage:
#   docker compose up        # pull image, start db and pgpeek
#   docker compose up -d     # same, detached
#   docker compose down       # stop (keeps volumes / saved queries)
#   docker compose down -v    # stop and wipe db + saved-query volumes
#
# Then open http://localhost:8080
#
# The pgpeek service uses the published image (ghcr.io/descope/pgpeek:latest).
# For local development (build from source), see:
# https://github.com/descope/pgpeek#run-locally

services:
  db:
    image: postgres:16@sha256:081f1bc7bd5e143dbb6e487b710bbc27712cdcfaced4c071b8e47349aa1b4171
    environment:
      POSTGRES_USER: pgpeek
      POSTGRES_PASSWORD: pgpeek
      POSTGRES_DB: pgpeek
    # The app reaches Postgres over the compose network (db:5432), so the db
    # port is NOT published by default — that keeps the stack clash-free. For
    # ad-hoc queries from your host, either run:
    #   docker compose exec db psql -U pgpeek pgpeek
    # or uncomment the mapping below (pick any free host port):
    # ports:
    #   - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Seed demo data on first init (fresh volume only). See dev/seed.sql.
      - ./dev/seed.sql:/docker-entrypoint-initdb.d/10-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pgpeek -d pgpeek"]
      interval: 5s
      timeout: 5s
      retries: 12

  pgpeek:
    image: ghcr.io/descope/pgpeek:latest
    # Named volumes start root-owned; run as root so the SQLite store can
    # be written to /data. (k8s manifests use a nonroot PVC in prod.)
    user: root
    environment:
      # In-network hostname `db` + the container port 5432 (not 55432).
      # DEV ONLY: plaintext credentials + sslmode=disable are acceptable on the
      # local compose network. NEVER copy this DSN to staging/prod — use a
      # secret-mounted DATABASE_URL_FILE and sslmode=require there.
      DATABASE_URL: postgres://pgpeek:pgpeek@db:5432/pgpeek?sslmode=disable
      PGPEEK_LISTEN: ":8080"
      PGPEEK_STORE_PATH: /data/pgpeek.db
    ports:
      - "8080:8080"
    volumes:
      - pgpeekdata:/data
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  pgpeekdata:
