# Example only — DO NOT commit a real secret. Create it out-of-band, e.g.:
#
#   kubectl create secret generic pgpeek-db \
#     --from-literal=DATABASE_URL='postgres://descoperead:PASSWORD@your-aurora-host:5432/yourdb?sslmode=require'
#
# Use the read-only role (descoperead). sslmode=require is mandatory for Aurora.
# Prefer a sealed-secret / external-secrets operator over a plain manifest.
apiVersion: v1
kind: Secret
metadata:
  name: pgpeek-db
  labels:
    app: pgpeek
type: Opaque
stringData:
  DATABASE_URL: "postgres://descoperead:CHANGE_ME@your-aurora-host:5432/yourdb?sslmode=require"
