# ServiceAccount for pgpeek. When using RDS/Aurora IAM authentication
# (PGPEEK_DB_IAM_AUTH=true), annotate it for IRSA so the pod assumes an AWS role
# that holds `rds-db:connect` on the read-only DB user. Without IAM auth, the
# annotation is harmless to omit.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pgpeek
  labels:
    app: pgpeek
  annotations:
    # Replace with your IRSA role ARN, or delete this annotation for password auth.
    eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/pgpeek-rds-connect
