<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>pgpeek — read-only SQL browser</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
<style>
  :root {
    --bg: #0f1115; --panel: #181b22; --border: #2a2f3a; --text: #e6e8eb;
    --muted: #9aa3b2; --accent: #4f8cff; --danger: #ff5c5c; --ok: #3ecf8e;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  header { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); background: var(--panel); }
  header h1 { font-size: 15px; margin: 0; font-weight: 600; letter-spacing: .3px; }
  header .badge { font-size: 11px; color: var(--ok); border: 1px solid var(--border); padding: 2px 8px; border-radius: 999px; }
  .body { flex: 1; display: flex; min-height: 0; }

  /* sidebar */
  .sidebar { width: 260px; border-right: 1px solid var(--border); background: var(--panel); display: flex; flex-direction: column; min-height: 0; }
  .sidebar input { margin: 8px; padding: 6px 9px; background: #20242e; border: 1px solid var(--border); border-radius: 6px; color: var(--text); }
  #tables { overflow: auto; flex: 1; padding-bottom: 8px; }
  #tables .schema { padding: 6px 12px 2px; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  #tables .tbl { display: block; width: 100%; text-align: left; border: 0; background: transparent; color: var(--text); padding: 4px 12px 4px 22px; cursor: pointer; font: inherit; }
  #tables .tbl:hover { background: #20242e; }
  #tables .tbl.active { background: var(--accent); color: #fff; }
  #tables .tbl.view { font-style: italic; color: var(--muted); }
  #tables .tbl.view.active { color: #fff; }

  /* main */
  main { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .tabs { display: flex; align-items: center; gap: 4px; padding: 6px 12px; border-bottom: 1px solid var(--border); background: var(--panel); }
  .tabs button { background: transparent; border: 1px solid transparent; color: var(--muted); padding: 5px 12px; border-radius: 6px; cursor: pointer; font: inherit; }
  .tabs button.active { color: var(--text); background: #20242e; border-color: var(--border); }
  .tabs .title { margin-left: auto; color: var(--muted); font-size: 13px; }
  .panel { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .panel[hidden] { display: none; }

  select, button, input { font: inherit; color: var(--text); background: #20242e; border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; }
  button { cursor: pointer; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
  button:disabled { opacity: .5; cursor: default; }
  button.ghost { background: transparent; }

  .toolbar { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--panel); flex-wrap: wrap; }
  .toolbar .hint, .toolbar .page-info { color: var(--muted); font-size: 12px; }
  .editor-wrap { border-bottom: 1px solid var(--border); }
  .CodeMirror { height: 180px; font-size: 13px; background: var(--panel); color: var(--text); }
  .CodeMirror-gutters { background: #14171d; border-right: 1px solid var(--border); }
  .CodeMirror-linenumber { color: #5b6472; }
  .CodeMirror-cursor { border-left: 1px solid var(--text); }
  .CodeMirror-selected { background: #2b3550 !important; }
  .cm-s-default .cm-keyword { color: #c792ea; }
  .cm-s-default .cm-string { color: #c3e88d; }
  .cm-s-default .cm-number { color: #f78c6c; }
  .cm-s-default .cm-comment { color: #5b6472; }
  textarea#sql { width: 100%; height: 180px; background: var(--panel); color: var(--text); border: 0; padding: 10px; font: 13px/1.5 monospace; resize: vertical; }
  .results { flex: 1; overflow: auto; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { border: 1px solid var(--border); padding: 5px 9px; text-align: left; white-space: pre; max-width: 460px; overflow: hidden; text-overflow: ellipsis; }
  th { position: sticky; top: 0; background: #20242e; z-index: 1; }
  td.null { color: var(--muted); font-style: italic; }
  button.fk { background: none; border: 0; padding: 0; font: inherit; color: var(--accent); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
  button.fk:hover { color: #7aa7ff; }
  tbody tr:nth-child(even) { background: #14171d; }
  .empty { padding: 24px 16px; color: var(--muted); }
  .toolbar .sep { width: 1px; align-self: stretch; background: var(--border); }
  #data-search { min-width: 220px; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { background: #262b36; }
  tr.filter-row td { padding: 3px 5px; background: #14171d; position: sticky; top: 27px; }
  tr.filter-row select, tr.filter-row input { padding: 2px 4px; font-size: 12px; border-radius: 4px; }
  tr.filter-row select { width: 64px; }
  tr.filter-row input { width: calc(100% - 70px); }
  .status { padding: 6px 16px; font-size: 12px; min-height: 28px; border-top: 1px solid var(--border); background: var(--panel); }
  .status.error { color: var(--danger); }
  .status.ok { color: var(--muted); }
  .status .warn { color: #ffce5c; }
</style>
</head>
<body>
<header>
  <h1>pgpeek</h1>
  <span class="badge">read-only</span>
</header>

<div class="body">
  <aside class="sidebar">
    <input id="tbl-filter" type="search" placeholder="Filter tables…" autocomplete="off" />
    <div id="tables"><div class="empty">Loading tables…</div></div>
  </aside>

  <main>
    <div class="tabs">
      <button id="tab-data" class="active">Data</button>
      <button id="tab-structure">Structure</button>
      <button id="tab-sql">SQL</button>
      <span class="title" id="tab-title">Pick a table</span>
    </div>

    <!-- Data -->
    <section class="panel" id="panel-data">
      <div class="toolbar">
        <input id="data-search" type="search" placeholder="Search all columns…" autocomplete="off" />
        <button class="ghost" id="data-clear">Clear</button>
        <span class="sep"></span>
        <button class="ghost" id="prev-btn" disabled>◀ Prev</button>
        <button class="ghost" id="next-btn" disabled>Next ▶</button>
        <span class="page-info" id="page-info">—</span>
        <button class="ghost" id="data-export-btn" disabled>Export CSV</button>
      </div>
      <div class="results" id="data-results"><div class="empty">Select a table to browse its rows.</div></div>
    </section>

    <!-- Structure -->
    <section class="panel" id="panel-structure" hidden>
      <div class="results" id="structure-results"><div class="empty">Select a table to see its structure.</div></div>
    </section>

    <!-- SQL -->
    <section class="panel" id="panel-sql" hidden>
      <div class="editor-wrap">
        <textarea id="sql" placeholder="SELECT ... -- Ctrl/Cmd+Enter to run">SELECT now();</textarea>
      </div>
      <div class="toolbar">
        <button class="primary" id="run-btn">Run ▶</button>
        <button class="ghost" id="sql-export-btn" disabled>Export CSV</button>
        <select id="presets" title="Saved &amp; preset queries"><option value="">Saved queries…</option></select>
        <button class="ghost" id="save-btn">Save</button>
        <button class="ghost" id="delete-btn" disabled>Delete</button>
        <span class="hint">Ctrl/Cmd&nbsp;+&nbsp;Enter to run · single SELECT/WITH only</span>
      </div>
      <div class="results" id="sql-results"><div class="empty">Run a query to see results.</div></div>
    </section>
  </main>
</div>

<div class="status ok" id="status">Ready.</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/sql/sql.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
