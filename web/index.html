  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
  .skip-link { position: fixed; left: var(--space-3); top: var(--space-3); z-index: 10; transform: translateY(-140%); background: var(--accent); color: var(--on-accent); padding: var(--space-2) var(--space-3); border-radius: var(--radius-1); text-decoration: none; font-weight: 600; }
  .skip-link:focus { transform: translateY(0); }
  header { display: flex; align-items: center; gap: var(--space-3); padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--border); background: var(--panel); }
  header h1 { font-size: 16px; margin: 0; font-weight: 700; letter-spacing: .3px; }
  header .badge { font-size: 11px; color: var(--ok); border: 1px solid var(--border); padding: 2px var(--space-2); border-radius: 999px; background: var(--elev2); }
  header .db-select, header .theme-select { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 12px; }
  header .theme-select { margin-left: auto; }
  header .db-select select, header .theme-select select { padding: 4px 8px; }
  .body { flex: 1; display: flex; min-height: 0; }

  /* sidebar */
  .sidebar { width: 280px; border-right: 1px solid var(--border); background: var(--panel); display: flex; flex-direction: column; min-height: 0; }
  .side-head { display: flex; align-items: center; justify-content: space-between; padding: var(--space-3) var(--space-3) var(--space-1); color: var(--muted); font-size: 12px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; }
  .sidebar input { margin: var(--space-2); padding: var(--space-2) var(--space-3); background: var(--elev); border: 1px solid var(--border); border-radius: var(--radius-1); color: var(--text); }
  #tables { overflow: auto; flex: 1; padding: 0 var(--space-2) var(--space-2); scroll-padding: var(--space-4); }
  #tables .schema { padding: var(--space-3) var(--space-2) var(--space-1); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); }
  #tables .tbl { display: block; width: 100%; text-align: left; border: 1px solid transparent; background: transparent; color: var(--text); padding: var(--space-2) var(--space-3); cursor: pointer; font: inherit; border-radius: var(--radius-1); transition: background-color 180ms ease, border-color 180ms ease, color 180ms ease, transform 180ms ease; }
  #tables .tbl:hover { background: var(--hover); }
  #tables .tbl:active { transform: translateY(1px); }
  #tables .tbl.active { background: var(--selection); border-color: var(--accent); color: var(--text); font-weight: 600; }
  #tables .tbl.active::before { content: ""; display: inline-block; width: 6px; height: 6px; margin-right: var(--space-2); border-radius: 999px; background: var(--accent); vertical-align: 1px; }
  #tables .tbl.view { font-style: italic; color: var(--muted); }
  #tables .tbl.view.active { color: var(--on-accent); }

  /* main */
  main { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .tabs { display: flex; align-items: center; gap: var(--space-1); padding: var(--space-2) var(--space-3); border-bottom: 1px solid var(--border); background: var(--panel); }
  .tabs button { background: transparent; border: 1px solid transparent; color: var(--muted); padding: var(--space-1) var(--space-3); border-radius: var(--radius-1); cursor: pointer; font: inherit; transition: background-color 180ms ease, border-color 180ms ease, color 180ms ease, transform 180ms ease; }
  .tabs button.active { color: var(--text); background: var(--elev); border-color: var(--border); }
  .tabs .title { margin-left: auto; color: var(--muted); font-size: 13px; }
  .context-bar { display: flex; align-items: baseline; gap: var(--space-3); padding: var(--space-3) var(--space-4); border-bottom: 1px solid var(--border); background: var(--elev2); }
  .context-bar strong { font-size: 16px; letter-spacing: .01em; }
  .context-bar strong span { color: var(--muted); }
  .context-kicker, .context-meta { color: var(--muted); font-size: 12px; }
  .context-kicker { text-transform: uppercase; letter-spacing: .06em; font-weight: 700; }
  .empty-context strong { color: var(--muted); font-weight: 500; }
  .panel { flex: 1; display: flex; flex-direction: column; min-height: 0; }
  .panel[hidden] { display: none; }

  select, button, input { font: inherit; color: var(--text); background: var(--elev); border: 1px solid var(--border); border-radius: var(--radius-1); padding: 6px 10px; }
  button, a[role="button"] { cursor: pointer; }
  button.primary { background: var(--accent); border-color: var(--accent); color: var(--on-accent); font-weight: 600; }
  button:disabled { opacity: .5; cursor: default; }
  button.ghost { background: transparent; transition: background-color 180ms ease, border-color 180ms ease, color 180ms ease, transform 180ms ease; }
  button.ghost:hover:not(:disabled), .tabs button:hover { background: var(--hover); color: var(--text); }
  button.ghost:active:not(:disabled), .tabs button:active { transform: translateY(1px); }
  .action { display: inline-flex; align-items: center; justify-content: center; min-height: 34px; padding: 6px var(--space-3); border: 1px solid var(--border); border-radius: var(--radius-1); text-decoration: none; font-weight: 600; transition: background-color 180ms ease, border-color 180ms ease, color 180ms ease, transform 180ms ease; }
  .action.secondary { color: var(--accent); background: transparent; border-color: var(--accent); }
  .action.secondary:hover { color: var(--accent-hover); background: var(--selection); border-color: var(--accent-hover); }
  .action.secondary:active { transform: translateY(1px); }
  :is(a, button, input, select, th[tabindex]):focus-visible { outline: 2px solid var(--accent-hover); outline-offset: 2px; }

  .toolbar { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-bottom: 1px solid var(--border); background: var(--panel); flex-wrap: wrap; }
  .toolbar .hint, .toolbar .page-info { color: var(--muted); font-size: 12px; }
  .editor-wrap { border-bottom: 1px solid var(--border); }
  .CodeMirror { height: 180px; font-size: 13px; background: var(--panel); color: var(--text); }
  .CodeMirror-gutters { background: var(--elev2); border-right: 1px solid var(--border); }
  .CodeMirror-linenumber { color: var(--linenum); }
  .CodeMirror-cursor { border-left: 1px solid var(--text); }
  .CodeMirror-selected { background: var(--selection) !important; }
  .cm-s-default .cm-keyword { color: var(--cm-keyword); }
  .cm-s-default .cm-string { color: var(--cm-string); }
  .cm-s-default .cm-number { color: var(--cm-number); }
  .cm-s-default .cm-comment { color: var(--linenum); }
  textarea#sql { width: 100%; height: 180px; background: var(--panel); color: var(--text); border: 0; padding: 10px; font: 13px/1.5 monospace; resize: vertical; }
  .results { flex: 1; overflow: auto; }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  th, td { border: 1px solid var(--border); padding: 5px 9px; text-align: left; white-space: pre; max-width: 460px; overflow: hidden; text-overflow: ellipsis; }
  th { position: sticky; top: 0; background: var(--elev); z-index: 1; }
  td.null { color: var(--muted); font-style: italic; }
  button.fk { background: none; border: 0; padding: 0; font: inherit; color: var(--accent); cursor: pointer; text-decoration: underline; text-underline-offset: 2px; }
  button.fk:hover { color: var(--accent-hover); }
  tbody tr:nth-child(even) { background: var(--elev2); }
  .empty { padding: 24px 16px; color: var(--muted); }
  .toolbar .sep { width: 1px; align-self: stretch; background: var(--border); }
  #data-search { min-width: 220px; }
  th.sortable { cursor: pointer; user-select: none; }
  th.sortable:hover { background: var(--hover); }
  tr.filter-row td { padding: 3px 5px; background: var(--elev2); position: sticky; top: 27px; }
  tr.filter-row select, tr.filter-row input { padding: 2px 4px; font-size: 12px; border-radius: 4px; }
  tr.filter-row select { width: 64px; }
  tr.filter-row input { width: calc(100% - 70px); }
  .status { padding: 6px 16px; font-size: 12px; min-height: 28px; border-top: 1px solid var(--border); background: var(--panel); }
  .status.error { color: var(--danger); }
  .status.ok { color: var(--muted); }
  .status .warn { color: var(--warn); }
  @media (max-width: 760px) {
    body { height: auto; min-height: 100vh; overflow-x: hidden; }
    header { flex-wrap: wrap; }
    header .db-select, header .theme-select { flex: 1 1 150px; min-width: 0; }
    header .theme-select { margin-left: 0; }
    header .db-select select, header .theme-select select { min-width: 0; width: 100%; }
    .body { flex-direction: column; }
    .sidebar { width: 100%; max-height: 36vh; border-right: 0; border-bottom: 1px solid var(--border); }
    .tabs, .toolbar, .context-bar { align-items: stretch; }
    .tabs .title { display: none; }
    .context-bar { flex-direction: column; gap: var(--space-1); }
    #data-search { min-width: 100%; }
  }
</style>
</head>
